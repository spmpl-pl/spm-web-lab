{% extends "base.html" %}

{% block title %}API Panel{% endblock %}

{% block content %}

  <!-- Main content -->
    <h1><p>API Panel</p></h1>

    <!-- GetGetSession Section -->

    <p>GetSession (POST /api/GetSession)</p>
    <button id="GetGetSessionButton">Get The Session Data (/api/GetSession)</button>
    <div id="GetGetSessionResult" class="result"></div>

   
    <br>
    <p>GetSum (POST /api/GetSum)</p>
    <input type="text" id="GetSumInput1" placeholder="Argument 1">
    <input type="text" id="GetSumInput2" placeholder="Argument 2">
    <button id="GetSumButton">Get Sum (POST /get/GetSum)</button>
    <div id="GetSumResult" class="result"></div>

    <br>
    <p>GetProduct (POST /api/GetProduct)</p>
    <input type="text" id="GetProductCategory" placeholder="Product Category ID">
    <input type="text" id="GetProductId" placeholder="Product ID">
    <button id="GetProductButton">Get Product (POST /api/GetProduct)</button>
    <div id="GetProductResult" class="result"></div>

    <br>
    <p>Get User Data (POST /api/GetUserData)</p>
    <input type="text" id="GetUserDataInput" placeholder="Type the userID">
    <button id="GetUserDataButton">Get User Data (POST /api/GetUserData)</button>
    <div id="GetUserDataResult" class="result"></div>

    <br>
    <p>Guestbook (POST /api/GuestBook)</p>
    <input type="text" id="GuestBookInput" placeholder="Type the userID">
    <button id="GuestBookButton">GuestBook Data (POST /api/GuestBook)</button>
    <div id="GuestBookResult" class="result"></div>

  <script>

    document.getElementById('GetGetSessionButton').onclick = () => {
      fetch('/api/GetSession')
        .then(res => res.json())
        .then(data => {
          document.getElementById('GetGetSessionResult').innerText = JSON.stringify(data, null, 2);
        });
    };

      // GetSum POST Request
    document.getElementById('GetSumButton').onclick = () => {
      const a = document.getElementById('GetSumInput1').value
      const b = document.getElementById('GetSumInput2').value

      if (!a || !b)  {
        alert("Please type a message!");
        return;
      }

      fetch('/api/GetSum', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ arg1: a, arg2: b })
      })
      .then(res => res.json())
      .then(data => {
        document.getElementById('GetSumResult').innerText = JSON.stringify(data, null, 2);
      });
    };

      // GetProduct POST Request
    document.getElementById('GetProductButton').onclick = () => {
      const a = document.getElementById('GetProductCategory').value
      const b = document.getElementById('GetProductId').value

      if (!a || !b)  {
        alert("Please type a Category ID and Product ID!");
        return;
      }

      fetch('/api/GetProduct', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ category: a, id: b })
      })
      .then(res => res.json())
      .then(data => {
        document.getElementById('GetProductResult').innerText = JSON.stringify(data, null, 2);;
      });
    };



    // GetUserData POST Request
    document.getElementById('GetUserDataButton').onclick = () => {
      const userInput = document.getElementById('GetUserDataInput').value;
      if (!userInput) {
        alert("Please type a message!");
        return;
      }

      fetch('/api/GetUserData', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: userInput })
      })
      .then(res => res.json())
      .then(data => {
        document.getElementById('GetUserDataResult').innerText = JSON.stringify(data, null, 2);
      });
    };

    // GuestBook POST Request
    document.getElementById('GuestBookButton').onclick = () => {
      const userInput = document.getElementById('GuestBookInput').value;
      if (!userInput) {
        alert("Please type a message!");
        return;
      }

      fetch('/api/GuestBook', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: userInput })
      })
      .then(res => res.json())
      .then(data => {
        document.getElementById('GuestBookResult').innerText = JSON.stringify(data, null, 2);
      });
    };

  </script>

{% endblock %}
