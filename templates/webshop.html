{% extends "base.html" %}

{% block title %}Webshop{% endblock %}

{% block content %}


    <div class="topbar">
      <span>CART ITEMS: <strong id="CartItemsID">0</strong></span>
      <span>CART VALUE: <strong id="CartValueID">0</strong></span>
      <a href="/checkout" id="goToCartLink">Go to Cart →</a>
    </div>

    <h1>Webshop</h1>

    <br><b>CATEGORY:   </b><select id="categorySelect">
      <option value="">-- Select category --</option>
    </select>
  
    <br>

    <div id="productList" class="product-grid"></div>

  </p>

<script>
  

  const select = document.getElementById("categorySelect");


  async function LoadCategories() {
    try {
      const response = await fetch("/api/GetCategories");
      const categories = await response.json();

      // clear placeholder
      select.innerHTML = '<option value="">-- Select category --</option>';

      // sort by ID (optional but recommended)
      Object.keys(categories)
        .sort((a, b) => Number(a) - Number(b))
        .forEach(id => {
          const option = document.createElement("option");
          option.value = id;
          option.textContent = categories[id].name;
          select.appendChild(option);
        });

    } catch (err) {
      console.error("Failed to load categories:", err);
      select.innerHTML = '<option value="">Failed to load</option>';
    }
  }

  function LoadItems(RequestedCategory) {

      fetch("/api/GetProductsByCategory", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ "pCAT": RequestedCategory })
        })
        .then(res => res.json())
        .then(data => {
          
            const container = document.getElementById("productList");
            container.innerHTML = "";

            data.forEach(item => {
              const card = document.createElement("div");
              card.className = "product-card";

              card.innerHTML = `
                <div class="product-title">${item.name}</div>
                <div class="product-desc">${item.description}</div>

                <div class="product-price">
                  <span class="priceCell" id="pricefield-${item.pID}">Price: Click "Get Price"</span>
                </div>

                <div class="product-actions">
                  <button class="getPriceBtn"
                    id="getPriceBtn-${item.pID}"
                    data-id1="${item.pID}">
                    Get Price
                  </button>

                  <button class="AddToCartBtn"
                    id="AddToCartBtn-${item.pID}"
                    data-id1="${item.pID}">
                    Add to Cart
                  </button>
                </div>
              `;

              container.appendChild(card);
          });



        // Attach click listeners to GetPrice buttons
      document.querySelectorAll(".getPriceBtn").forEach(button => {
        button.addEventListener("click", async (e) => {
          const btn = e.target;
          const productId = btn.dataset.id1;

          const card = btn.closest(".product-card");
          const priceCell = card.querySelector(".priceCell");

          fetch('/api/GetProductByID', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ pID: productId })
          })
          .then(async res => {
            if (!res.ok) {
              if (res.status === 401) throw new Error('Unauthorized - please log in');
              const message = await res.text();
              throw new Error(message || `HTTP error ${res.status}`);
            }
            return res.json();
          })
          .then(data => {
            priceCell.textContent = "Price: " + data.price + " USD";
          })
          .catch(err => {
            console.error(err);
            priceCell.textContent = err.message;
          });
        });
      });

      // Attach click listeners to Addto Cart buttons
      document.querySelectorAll(".AddToCartBtn").forEach(button => {
        button.addEventListener("click", async (e) => {
          const btn = e.target;
          const productId = btn.dataset.id1;

          const card = btn.closest(".product-card");
          const priceCell = card.querySelector(".priceCell");

          fetch('/api/AddToCart', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ pID: productId, pQTY: 1 })
          })
          .then(async res => {
            if (!res.ok) {
              if (res.status === 401) throw new Error('Unauthorized - please log in');
              const message = await res.text();
              throw new Error(message || `HTTP error ${res.status}`);
            }
            return res.json();
          })
          .then(data => {
            priceCell.textContent = "Added to Cart!"; 
            UpdateCartSummary()
          })
          .catch(err => {
            console.error(err);
            priceCell.textContent = err.message;
          });
        });
      });


    });
  }
  
  function UpdateCartSummary() {

    fetch('/api/GetCartInfo')
    .then(async res => {
      if (!res.ok) {
        if (res.status === 401) throw new Error('Unauthorized - please log in');
        const message = await res.text();
        throw new Error(message || `HTTP error ${res.status}`);
      }
      return res.json();
    })
    .then(data => {
        document.getElementById('CartItemsID').textContent = data.cITEMS
        document.getElementById('CartValueID').textContent = data.cPRICE + " USD"
    });
  }
  function UpdateCheckoutLink() {
    const link = document.getElementById("goToCartLink");
    fetch("/api/GetSession")
      .then((res) => res.json())
      .then((data) => {
        if (data.username) {
          link.href = "/checkout";   // restore URL
          link.classList.remove("disabled");
        } else {
          link.dataset.href = link.href;   // store original URL
          link.removeAttribute("href");    // remove navigation
          link.classList.add("disabled");  // optional styling
        }
      });
    }

  LoadCategories();
  UpdateCartSummary();
  UpdateCheckoutLink();

  select.addEventListener("change", function () {
    const categoryId = this.value;
    if (categoryId) {
      LoadItems(categoryId);
    }
  });


</script>

{% endblock %}
