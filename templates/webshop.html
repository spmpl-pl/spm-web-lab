{% extends "base.html" %}

{% block title %}Webshop{% endblock %}

{% block content %}

    <h1>Webshop</h1>
<p style="font-size:16px; color:#333; margin-bottom:10px;">
  Please select what looks interesting for you!  

<table id="productTable">
  <thead>
    <tr>
      <th>Products</th>
    </tr>
  </thead>
  <tbody>
    <!-- Rows will be inserted here -->
  </tbody>
</table>
</p>

<script>
  
  fetch("/api/GetProductOverview")
    .then(res => res.json())
    .then(data => {
      
      const tbody = document.querySelector("#productTable tbody");

      // Loop through data and create rows
      data.data.forEach(item => {
      const tr = document.createElement("tr");

    tr.innerHTML = `
      <td><table><tr><td>Category:</td><td> ${item.category_name}</td><tr><tr><td>Product ID:</td><td> ${item.id}</td></tr><tr><td>Name:</td><td> ${item.name}</td></tr><tr><td>Description:</td><td> ${item.description}</td></tr>
        </table><br><br><div><b> Price: <span id="pricefield-${item.category_id}-${item.id}" class="priceCell">Click "Get Price" to see the price!</span></b></div><br><br>
        <button class="getPriceBtn" id="getPriceBtn-${item.category_id}-${item.id}" data-id1="${item.id}" data-id2="${item.category_id}">Get Price</button>
    `;
    tbody.appendChild(tr);
  });

  // Attach click listeners to buttons
document.querySelectorAll(".getPriceBtn").forEach(button => {
  button.addEventListener("click", async (e) => {
    const btn = e.target;
    const productId = btn.dataset.id1;
    const productCategory = btn.dataset.id2;
    const row = btn.closest("tr");
    const priceCell = row.querySelector(".priceCell");

    fetch('/api/GetProduct', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ category: productCategory, id: productId })
    })
    .then(async res => {
      if (!res.ok) {
        if (res.status === 401) {
          throw new Error('Unauthorized - please log in');
        }
        const message = await res.text();
        throw new Error(message || `HTTP error ${res.status}`);
      }
      return res.json();
    })
    .then(data => {
      priceCell.textContent = data.price + " USD"; 
    })
    .catch (err => {
    console.error(err);
    priceCell.textContent = err.message;
    })
    
})  
});
      
    });
</script>

{% endblock %}
