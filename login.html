<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- Top menu -->
  <nav class="top-menu">
    <a href="/" class="menu-link">Home</a>
    <a href="/panel" class="menu-link">Panel</a>
    <a href="/login" id="loginlink" class="menu-link">Login</a>
  </nav>

<!--Login Information-->
<div class="login-info" style="text-align: right">
  <span id="usernameDisplay">Logged in as: user</span>
  <button id="logoutButton">Logout</button>
</div>

  <div class="container">
    <h1>Login</h1>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button id="loginButton">Login</button>
    <div id="loginResult" class="result"></div>
  </div>


  <script>

    const logoutBtn = document.getElementById('logoutButton');
    const usernameSpan = document.getElementById('usernameDisplay');
    const loginlink = document.getElementById('loginlink');

    // Display logged-in user and enable/disable logout
    function updateUserInfo() {
      fetch('/api/data')
        .then(res => res.json())
        .then(data => {
          if(data.logged_in_as) {
            usernameSpan.innerText = "Logged in as: " + data.logged_in_as;
            logoutBtn.disabled = false;
            loginlink.style.display = data.logged_in_as ? 'none' : 'inline-block';

          } else {
            usernameSpan.innerText = "Not logged in";
            logoutBtn.disabled = true;
          }
        });
    }

    window.onload = updateUserInfo;

    // Logout
    logoutBtn.onclick = () => {
      fetch('/logout')
        .then(res => res.json())
        .then(data => {
          alert(data.message);
          window.location.href = '/login';
        });
    };


    document.getElementById('loginButton').onclick = () => {
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      fetch('/api/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({username, password})
      })
      .then(res => res.json())
      .then(data => {
        if (data.success) {
          document.getElementById('loginResult').innerText = data.message;
            setTimeout(() => {
            window.location.href = '/';
            }, 1000);
        } else {
          document.getElementById('loginResult').innerText = data.message;
        }
      });
    };
  </script>
</body>
</html>
